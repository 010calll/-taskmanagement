name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker compose services
        run: |
          docker compose build --no-cache

      - name: Start services
        run: |
          docker compose up -d

      - name: Wait for web service
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:1122 >/dev/null; do sleep 3; done'

      - name: Smoke test home page
        run: |
          curl -f http://localhost:1122

      - name: Stop services
        if: always()
        run: |
          docker compose down
