name: CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker compose services
        run: |
          docker compose build --no-cache

      - name: Start services
        run: |
          docker compose up -d

      - name: Wait for web service
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:1122 >/dev/null; do sleep 3; done'

      - name: Smoke test home page
        run: |
          curl -f http://localhost:1122

      - name: Stop services
        if: always()
        run: |
          docker compose down

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd project
            git pull origin main
            docker compose down
            docker compose up --build -d
